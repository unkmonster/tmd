<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD &middot; Twitter Media Downloader</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="app-layout" id="app">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        TMD
      </a>
      <div class="sidebar-subtitle">Twitter Media Downloader</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Downloads</div>
      <button class="nav-item active" data-page="tasks">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tasks
      </button>

      <div class="nav-section-label">Management</div>
      <button class="nav-item" data-page="data">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        Data
      </button>
      <button class="nav-item" data-page="schedules">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Schedules
      </button>

      <div class="nav-section-label">Settings</div>
      <button class="nav-item" data-page="system">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        System
      </button>

      <div class="nav-section-label">Monitoring</div>
      <button class="nav-item" data-page="logs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Logs
      </button>
    </div>

    <div class="sidebar-footer">
      <a href="https://github.com/leeexx2001/tmd" target="_blank" rel="noopener" style="color:inherit;text-decoration:none" id="version-info">v2 &middot; Go + SQLite</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Top Bar -->
    <header class="top-bar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 id="page-title">Tasks</h1>
      </div>
      <div class="top-bar-actions">
        <div class="health-indicator" id="health-indicator">
          <span class="health-dot" id="health-dot"></span>
          <span id="health-text">Checking...</span>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content" id="page-content">
      <div class="loading"><div class="spinner"></div> Loading...</div>
    </main>
  </div>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<!-- Auth Modal (hidden by default, shown on 401) -->
<div class="auth-overlay" id="authOverlay" style="display:none">
  <div class="auth-modal">
    <div class="auth-modal-header">
      <div class="auth-modal-title">Authentication Required</div>
    </div>
    <div class="auth-modal-body">
      <p class="auth-modal-desc">This server requires an API Key. Enter your key below, or configure one in System settings.</p>
      <input type="password" id="authDialogKey" class="auth-modal-input" placeholder="Enter API Key"
        autocomplete="off" />
      <div class="auth-modal-status" id="authDialogStatus"></div>
    </div>
    <div class="auth-modal-footer">
      <button class="btn btn-sm" onclick="hideAuthDialog()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="authSubmitBtn" onclick="submitAuthKey()">Confirm</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
