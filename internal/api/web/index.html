<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TMD Pro - Twitter Media Downloader</title>
<style>
/* ============================================
   CSS Variables - Design System
   ============================================ */
:root {
  /* Background Layers */
  --bg-primary: #0a0c10;
  --bg-secondary: #111318;
  --bg-tertiary: #1a1d24;
  --bg-elevated: #21262d;
  
  /* Borders */
  --border-primary: #1f232c;
  --border-secondary: #2a2d35;
  --border-focus: #2f81f7;
  
  /* Text */
  --text-primary: #e6e8ec;
  --text-secondary: #8b949e;
  --text-tertiary: #6e7681;
  --text-disabled: #484f58;
  
  /* Accent */
  --accent-primary: #2f81f7;
  --accent-hover: #388bfd;
  --accent-active: #1f6feb;
  
  /* Status Colors */
  --success: #3fb950;
  --success-bg: rgba(63, 185, 80, 0.12);
  --warning: #f0883e;
  --warning-bg: rgba(240, 136, 62, 0.12);
  --danger: #f85149;
  --danger-bg: rgba(248, 81, 73, 0.12);
  --info: #58a6ff;
  --info-bg: rgba(88, 166, 255, 0.12);
  
  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, Monaco, monospace;
  
  --text-xs: 11px;
  --text-sm: 12px;
  --text-base: 14px;
  --text-lg: 16px;
  --text-xl: 20px;
  --text-2xl: 24px;
  
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;
  
  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  
  --sidebar-width: 220px;
  --sidebar-collapsed: 64px;
  --header-height: 60px;
  --content-max-width: 1400px;
  --mobile-nav-height: 64px;
  
  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
  
  /* Animation */
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 350ms;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ============================================
   Reset & Base Styles
   ============================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  display: flex;
  min-height: 100vh;
}

button, input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  outline: none;
}

button {
  cursor: pointer;
}

a {
  color: var(--accent-primary);
  text-decoration: none;
}

ul, ol {
  list-style: none;
}

/* ============================================
   Sidebar Navigation
   ============================================ */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-primary);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform var(--duration-normal) var(--ease-out);
}

.sidebar-header {
  height: var(--header-height);
  display: flex;
  align-items: center;
  padding: 0 var(--space-4);
  border-bottom: 1px solid var(--border-primary);
  gap: var(--space-3);
}

.logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent-primary), var(--success));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--font-bold);
  font-size: var(--text-sm);
  color: white;
}

.logo-text {
  font-size: var(--text-lg);
  font-weight: var(--font-semibold);
  color: var(--text-primary);
}

.sidebar-nav {
  flex: 1;
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: var(--text-base);
  font-weight: var(--font-medium);
  transition: all var(--duration-fast);
  cursor: pointer;
}

.nav-item:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-primary);
  color: white;
}

.nav-item .icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-lg);
}

.sidebar-footer {
  padding: var(--space-4);
  border-top: 1px solid var(--border-primary);
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  text-align: center;
}

/* ============================================
   Main Content Area
   ============================================ */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.top-header {
  height: var(--header-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-6);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-left {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

.menu-toggle {
  display: none;
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: var(--text-xl);
}

.menu-toggle:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.page-title {
  font-size: var(--text-xl);
  font-weight: var(--font-semibold);
  color: var(--text-primary);
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.breadcrumb a:hover {
  color: var(--text-primary);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

/* Content Container */
.content-container {
  flex: 1;
  padding: var(--space-6);
  max-width: var(--content-max-width);
  width: 100%;
  margin: 0 auto;
}

/* ============================================
   Components
   ============================================ */

/* Cards */
.card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-primary);
  min-height: 56px;
}

.card-title {
  font-size: var(--text-base);
  font-weight: var(--font-semibold);
  color: var(--text-primary);
}

.card-subtitle {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-top: var(--space-1);
}

.card-body {
  padding: var(--space-5);
}

.card-footer {
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--border-primary);
  background: var(--bg-tertiary);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 10px 16px;
  border-radius: var(--radius-md);
  font-size: var(--text-base);
  font-weight: var(--font-medium);
  transition: all var(--duration-fast);
  cursor: pointer;
  white-space: nowrap;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-primary {
  background: var(--accent-primary);
  color: white;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
}

.btn-primary:active:not(:disabled) {
  background: var(--accent-active);
}

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border-secondary);
}

.btn-secondary:hover:not(:disabled) {
  background: var(--border-secondary);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
}

.btn-danger:hover:not(:disabled) {
  background: var(--danger-bg);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}

.btn-ghost:hover:not(:disabled) {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.btn-sm {
  padding: 6px 12px;
  font-size: var(--text-sm);
}

.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  border-radius: var(--radius-md);
}

/* Form Elements */
.form-group {
  margin-bottom: var(--space-4);
}

.form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: var(--font-medium);
  color: var(--text-secondary);
  margin-bottom: var(--space-2);
}

.form-input,
.form-textarea,
.form-select {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  color: var(--text-primary);
  font-size: var(--text-base);
  transition: all var(--duration-fast);
}

.form-input:focus,
.form-textarea:focus,
.form-select:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(47, 129, 247, 0.1);
}

.form-input::placeholder,
.form-textarea::placeholder {
  color: var(--text-tertiary);
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
}

.form-checkbox {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  cursor: pointer;
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.form-checkbox input[type="checkbox"] {
  appearance: none;
  width: 16px;
  height: 16px;
  border: 1px solid var(--border-secondary);
  border-radius: var(--radius-sm);
  background: var(--bg-primary);
  cursor: pointer;
  position: relative;
  transition: all var(--duration-fast);
}

.form-checkbox input[type="checkbox"]:checked {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
}

.form-checkbox input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 11px;
  font-weight: bold;
}

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 3px 10px;
  border-radius: var(--radius-md);
  font-size: var(--text-xs);
  font-weight: var(--font-semibold);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.tag-queued {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}

.tag-running {
  background: var(--info-bg);
  color: var(--info);
}

.tag-running::before {
  content: '';
  width: 6px;
  height: 6px;
  background: currentColor;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

.tag-completed {
  background: var(--success-bg);
  color: var(--success);
}

.tag-failed {
  background: var(--danger-bg);
  color: var(--danger);
}

.tag-cancelled {
  background: var(--warning-bg);
  color: var(--warning);
}

/* Progress Bar */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-primary), var(--success));
  border-radius: 3px;
  transition: width 0.3s var(--ease-out);
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
}

.data-table th,
.data-table td {
  padding: var(--space-3) var(--space-4);
  text-align: left;
  border-bottom: 1px solid var(--border-primary);
}

.data-table th {
  font-weight: var(--font-semibold);
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table tr:hover td {
  background: var(--bg-tertiary);
}

.data-table tr:last-child td {
  border-bottom: none;
}

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--border-primary);
}

.pagination-info {
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.pagination-controls {
  display: flex;
  align-items: center;
  gap: var(--space-1);
}

.page-btn {
  min-width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  color: var(--text-secondary);
  transition: all var(--duration-fast);
}

.page-btn:hover:not(:disabled) {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.page-btn.active {
  background: var(--accent-primary);
  color: white;
}

.page-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-12) var(--space-6);
  text-align: center;
}

.empty-icon {
  width: 64px;
  height: 64px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-2xl);
  margin-bottom: var(--space-4);
}

.empty-title {
  font-size: var(--text-lg);
  font-weight: var(--font-semibold);
  color: var(--text-primary);
  margin-bottom: var(--space-2);
}

.empty-desc {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  max-width: 300px;
}

/* Toast Notifications */
.toast-container {
  position: fixed;
  top: var(--space-4);
  right: var(--space-4);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  min-width: 280px;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  animation: slideInRight 0.3s var(--ease-out);
}

.toast-success {
  border-left: 3px solid var(--success);
}

.toast-error {
  border-left: 3px solid var(--danger);
}

.toast-warning {
  border-left: 3px solid var(--warning);
}

.toast-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-lg);
  flex-shrink: 0;
}

.toast-success .toast-icon { color: var(--success); }
.toast-error .toast-icon { color: var(--danger); }
.toast-warning .toast-icon { color: var(--warning); }

.toast-content {
  flex: 1;
}

.toast-title {
  font-weight: var(--font-semibold);
  color: var(--text-primary);
  margin-bottom: var(--space-1);
}

.toast-message {
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.toast-close {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  cursor: pointer;
  flex-shrink: 0;
}

.toast-close:hover {
  color: var(--text-primary);
}

/* Drawer */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 200;
  opacity: 0;
  visibility: hidden;
  transition: all var(--duration-normal);
}

.drawer-overlay.open {
  opacity: 1;
  visibility: visible;
}

.drawer {
  position: fixed;
  right: 0;
  top: 0;
  width: 420px;
  max-width: 100%;
  height: 100vh;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-primary);
  z-index: 201;
  transform: translateX(100%);
  transition: transform var(--duration-normal) var(--ease-out);
  display: flex;
  flex-direction: column;
}

.drawer.open {
  transform: translateX(0);
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-primary);
}

.drawer-title {
  font-size: var(--text-lg);
  font-weight: var(--font-semibold);
}

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-5);
}

.drawer-footer {
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--border-primary);
  display: flex;
  gap: var(--space-3);
  justify-content: flex-end;
}

/* Mobile Navigation */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--mobile-nav-height);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-primary);
  z-index: 100;
}

.mobile-nav-items {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100%;
}

.mobile-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-1);
  padding: var(--space-2);
  color: var(--text-secondary);
  font-size: var(--text-xs);
  min-width: 64px;
}

.mobile-nav-item .icon {
  font-size: var(--text-xl);
}

.mobile-nav-item.active {
  color: var(--accent-primary);
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}

.stat-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

.stat-icon {
  width: 48px;
  height: 48px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-xl);
}

.stat-content {
  flex: 1;
}

.stat-value {
  font-size: var(--text-2xl);
  font-weight: var(--font-bold);
  color: var(--text-primary);
  line-height: 1.2;
}

.stat-label {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-top: var(--space-1);
}

/* Tabs */
.tabs {
  display: flex;
  gap: var(--space-1);
  border-bottom: 1px solid var(--border-primary);
  margin-bottom: var(--space-5);
}

.tab {
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm);
  font-weight: var(--font-medium);
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  transition: all var(--duration-fast);
}

.tab:hover {
  color: var(--text-primary);
}

.tab.active {
  color: var(--accent-primary);
  border-bottom-color: var(--accent-primary);
}

/* Task Item */
.task-item {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-4);
  border-bottom: 1px solid var(--border-primary);
  transition: background var(--duration-fast);
}

.task-item:hover {
  background: var(--bg-tertiary);
}

.task-item:last-child {
  border-bottom: none;
}

.task-checkbox {
  flex-shrink: 0;
}

.task-info {
  flex: 1;
  min-width: 0;
}

.task-title {
  font-weight: var(--font-medium);
  color: var(--text-primary);
  margin-bottom: var(--space-1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-meta {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.task-progress {
  width: 120px;
  flex-shrink: 0;
}

.task-progress-text {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  text-align: right;
  margin-top: var(--space-1);
}

.task-status {
  flex-shrink: 0;
}

.task-actions {
  display: flex;
  gap: var(--space-2);
  flex-shrink: 0;
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-5);
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-primary);
  gap: var(--space-4);
}

.toolbar-left,
.toolbar-right {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.search-input {
  width: 240px;
}

/* Grid Layout for Tasks Page */
.tasks-layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: var(--space-6);
  align-items: stretch;  /* 让两列高度相同 */
}

.tasks-layout > div {
  display: flex;
  flex-direction: column;
  min-height: 0;  /* 防止 flex 子项溢出 */
}

.tasks-layout > div > .card {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.tasks-layout > div > .card > .card-body {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* 任务列表区域占满剩余空间 */
.tasks-layout .task-list,
.tasks-layout .empty-state {
  flex: 1;
}

/* Animations */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Loading Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-elevated) 50%, var(--bg-tertiary) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-md);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ============================================
   Responsive Styles
   ============================================ */
@media (max-width: 1023px) {
  .sidebar {
    transform: translateX(-100%);
  }
  
  .sidebar.open {
    transform: translateX(0);
  }
  
  .main-content {
    margin-left: 0;
  }
  
  .menu-toggle {
    display: flex;
  }
  
  .tasks-layout {
    grid-template-columns: 1fr;
  }
  
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 767px) {
  .top-header {
    padding: 0 var(--space-4);
  }
  
  .page-title {
    font-size: var(--text-lg);
  }
  
  .content-container {
    padding: var(--space-4);
    padding-bottom: calc(var(--mobile-nav-height) + var(--space-4));
  }
  
  .mobile-nav {
    display: block;
  }
  
  .sidebar {
    width: 280px;
  }
  
  .sidebar-footer {
    display: none;
  }
  
  .stats-grid {
    grid-template-columns: 1fr;
  }
  
  .card-header {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-2);
  }
  
  .toolbar {
    flex-direction: column;
    align-items: stretch;
  }
  
  .toolbar-left,
  .toolbar-right {
    justify-content: space-between;
  }
  
  .search-input {
    width: 100%;
  }
  
  .data-table {
    display: none;
  }
  
  .mobile-card-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  
  .mobile-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-primary);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
  }
  
  .task-item {
    flex-wrap: wrap;
  }
  
  .task-progress {
    width: 100%;
    order: 3;
    margin-top: var(--space-2);
  }
  
  .drawer {
    width: 100%;
  }
  
  .toast-container {
    left: var(--space-4);
    right: var(--space-4);
  }
  
  .toast {
    min-width: auto;
    max-width: none;
  }
}

@media (min-width: 768px) {
  .mobile-card-list {
    display: none;
  }
}

/* Loading Spinner */
.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border-secondary);
  border-top-color: var(--accent-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: var(--space-2);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Utility Classes */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: var(--space-2); }
.gap-3 { gap: var(--space-3); }
.gap-4 { gap: var(--space-4); }
.mt-4 { margin-top: var(--space-4); }
.mb-4 { margin-bottom: var(--space-4); }
.text-sm { font-size: var(--text-sm); }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.font-mono { font-family: var(--font-mono); }
.truncate {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>

<script>
// ============================================
// State Management
// ============================================
const store = {
  state: {
    currentPage: 'overview',
    health: null,
    tasks: [],
    users: [],
    lists: [],
    entities: [],
    config: null,
    selectedTasks: new Set(),
    sidebarOpen: false,
    isMobile: window.innerWidth < 768,
    sseConnected: false,
    dataSubPage: 'users'
  },
  
  listeners: [],
  
  subscribe(fn) {
    this.listeners.push(fn);
  },
  
  setState(newState) {
    this.state = { ...this.state, ...newState };
    this.listeners.forEach(fn => fn(this.state));
  }
};

// ============================================
// API Client
// ============================================
const api = {
  base: '',
  
  async request(method, path, body = null) {
    const options = {
      method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (body) options.body = JSON.stringify(body);
    
    const res = await fetch(this.base + path, options);
    const data = await res.json().catch(() => ({ success: false, error: 'Invalid response' }));
    if (!res.ok || !data.success) throw new Error(data.error || `HTTP ${res.status}`);
    return data.data;
  },
  
  get(path) { return this.request('GET', path); },
  post(path, body) { return this.request('POST', path, body); },
  
  // Health
  getHealth() { return this.get('/api/v1/health'); },
  
  // Tasks
  getTasks() { return this.get('/api/v1/tasks'); },
  getTask(id) { return this.get(`/api/v1/tasks/${id}`); },
  cancelTask(id) { return this.post(`/api/v1/tasks/${id}/cancel`, {}); },
  
  // Task Creation
  createUserDownload(screenName, opts) { 
    return this.post(`/api/v1/users/${encodeURIComponent(screenName)}/download`, opts); 
  },
  createProfileDownload(screenName) { 
    return this.post(`/api/v1/users/${encodeURIComponent(screenName)}/profile`, {}); 
  },
  createListDownload(listId, opts) { 
    return this.post(`/api/v1/lists/${encodeURIComponent(listId)}/download`, opts); 
  },
  createListProfile(listId) { 
    return this.post(`/api/v1/lists/${encodeURIComponent(listId)}/profile`, {}); 
  },
  createBatchDownload(data) { 
    return this.post('/api/v1/batch/download', data); 
  },
  createJsonDownload(data) { 
    return this.post('/api/v1/json/download', data); 
  },
  
  // Data
  getUsers() { return this.get('/api/v1/db/users'); },
  getLists() { return this.get('/api/v1/db/lists'); },
  getEntities() { return this.get('/api/v1/db/user-entities'); },
  getConfig() { return this.get('/api/v1/config'); }
};

// ============================================
// SSE Manager
// ============================================
const sseManager = {
  conn: null,
  reconnectDelay: 2000,
  maxReconnectDelay: 30000,
  
  connect() {
    if (this.conn) return;
    
    this.conn = new EventSource('/api/v1/sse/tasks');
    
    this.conn.onmessage = (e) => {
      try {
        const tasks = JSON.parse(e.data);
        store.setState({ tasks });
        this.reconnectDelay = 2000;
      } catch (err) {}
    };
    
    this.conn.onerror = () => {
      this.conn.close();
      this.conn = null;
      store.setState({ sseConnected: false });
      setTimeout(() => this.connect(), this.reconnectDelay);
      this.reconnectDelay = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);
    };
    
    store.setState({ sseConnected: true });
  },
  
  disconnect() {
    if (this.conn) {
      this.conn.close();
      this.conn = null;
    }
    store.setState({ sseConnected: false });
  }
};

// ============================================
// Toast Notifications
// ============================================
const toast = {
  container: document.getElementById('toastContainer'),
  
  show(message, type = 'success', title = '') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    
    const icons = { success: '✓', error: '✕', warning: '⚠' };
    const titles = { success: '成功', error: '错误', warning: '警告' };
    
    el.innerHTML = `
      <span class="toast-icon">${icons[type]}</span>
      <div class="toast-content">
        <div class="toast-title">${title || titles[type]}</div>
        <div class="toast-message">${message}</div>
      </div>
      <span class="toast-close">✕</span>
    `;
    
    el.querySelector('.toast-close').onclick = () => el.remove();
    this.container.appendChild(el);
    
    setTimeout(() => el.remove(), 5000);
  }
};

// ============================================
// Drawer
// ============================================
const drawer = {
  el: document.getElementById('drawer'),
  overlay: document.getElementById('drawerOverlay'),
  title: document.getElementById('drawerTitle'),
  body: document.getElementById('drawerBody'),
  footer: document.getElementById('drawerFooter'),
  
  open(title, content, footer = '') {
    this.title.textContent = title;
    this.body.innerHTML = content;
    this.footer.innerHTML = footer;
    this.el.classList.add('open');
    this.overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  },
  
  close() {
    this.el.classList.remove('open');
    this.overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
};

document.getElementById('drawerClose').onclick = () => drawer.close();
document.getElementById('drawerOverlay').onclick = () => drawer.close();

// ============================================
// Page Renderers
// ============================================
const pages = {
  // Overview Page
  overview() {
    const { health, tasks, config } = store.state;
    
    const taskStats = { queued: 0, running: 0, completed: 0, failed: 0, cancelled: 0 };
    tasks.forEach(t => { if (taskStats[t.status] !== undefined) taskStats[t.status]++; });
    
    const recentTasks = tasks.slice(0, 5);
    
    return `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="color: var(--success);">●</div>
          <div class="stat-content">
            <div class="stat-value">${health ? (health.status === 'ok' ? '健康' : '异常') : '检查中'}</div>
            <div class="stat-label">系统状态 ${health ? 'v' + health.version : ''}</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="color: var(--info);">🚀</div>
          <div class="stat-content">
            <div class="stat-value">${taskStats.running}</div>
            <div class="stat-label">运行中任务</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="color: var(--success);">✓</div>
          <div class="stat-content">
            <div class="stat-value">${taskStats.completed}</div>
            <div class="stat-label">已完成任务</div>
          </div>
        </div>
      </div>
      
      <div class="card" style="margin-bottom: var(--space-6);">
        <div class="card-header">
          <div>
            <div class="card-title">⚡ 快速下载</div>
            <div class="card-subtitle">输入 Twitter 用户名或链接快速创建下载任务</div>
          </div>
        </div>
        <div class="card-body">
          <div class="flex gap-3" style="flex-wrap: wrap;">
            <input type="text" class="form-input" id="quickDownloadInput" 
              placeholder="输入用户名，如: elonmusk 或 https://twitter.com/elonmusk" 
              style="flex: 1; min-width: 280px;">
            <button class="btn btn-primary" onclick="handleQuickDownload()">创建任务</button>
          </div>
          <div class="text-sm text-tertiary mt-4">
            支持格式: twitter.com/username | x.com/username | @username
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <div class="card-title">最近任务</div>
          <button class="btn btn-ghost btn-sm" onclick="navigateTo('tasks')">查看全部 →</button>
        </div>
        <div class="card-body" style="padding: 0;">
          ${recentTasks.length === 0 ? `
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <div class="empty-title">暂无任务</div>
              <div class="empty-desc">创建一个新任务开始下载 Twitter 媒体文件</div>
            </div>
          ` : `
            <div class="task-list">
              ${recentTasks.map(t => renderTaskItem(t)).join('')}
            </div>
          `}
        </div>
      </div>
    `;
  },
  
  // Tasks Page
  tasks() {
    const { tasks } = store.state;
    
    return `
      <div class="tasks-layout">
        <div>
          <div class="card" style="position: sticky; top: calc(var(--header-height) + var(--space-6));">
            <div class="card-header">
              <div class="card-title">创建新任务</div>
            </div>
            <div class="card-body">
              <div class="tabs">
                <div class="tab active" data-task-tab="user">用户</div>
                <div class="tab" data-task-tab="list">列表</div>
                <div class="tab" data-task-tab="batch">批量</div>
                <div class="tab" data-task-tab="json">JSON</div>
              </div>
              
              <div id="taskFormContainer">
                ${renderTaskForm('user')}
              </div>
            </div>
          </div>
        </div>
        
        <div>
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">任务列表</div>
                <div class="card-subtitle">共 ${tasks.length} 个任务</div>
              </div>
            </div>
            <div class="toolbar">
              <div class="toolbar-left">
                <select class="form-select" style="width: 100px;" id="taskFilter">
                  <option value="all">全部状态</option>
                  <option value="running">运行中</option>
                  <option value="queued">排队中</option>
                  <option value="completed">已完成</option>
                  <option value="failed">失败</option>
                </select>
                <input type="text" class="form-input search-input" id="taskSearch" placeholder="搜索任务...">
              </div>
              <div class="toolbar-right">
                <button class="btn btn-ghost btn-sm" onclick="refreshTasks()">🔄 刷新</button>
              </div>
            </div>
            <div class="card-body" style="padding: 0;">
              ${tasks.length === 0 ? `
                <div class="empty-state">
                  <div class="empty-icon">🚀</div>
                  <div class="empty-title">暂无任务</div>
                  <div class="empty-desc">在左侧创建一个新任务开始下载</div>
                </div>
              ` : `
                <div class="task-list" id="taskList">
                  ${tasks.map(t => renderTaskItem(t, true)).join('')}
                </div>
              `}
            </div>
          </div>
        </div>
      </div>
    `;
  },
  
  // Data Page
  data() {
    const { dataSubPage, users, lists, entities } = store.state;
    
    const dataMap = {
      users: { title: 'Users', data: users, count: users.length },
      lists: { title: 'Lists', data: lists, count: lists.length },
      entities: { title: 'User Entities', data: entities, count: entities.length }
    };
    
    const current = dataMap[dataSubPage];
    
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="tabs" style="margin: 0; border: none;">
              <div class="tab ${dataSubPage === 'users' ? 'active' : ''}" onclick="setDataSubPage('users')">Users</div>
              <div class="tab ${dataSubPage === 'lists' ? 'active' : ''}" onclick="setDataSubPage('lists')">Lists</div>
              <div class="tab ${dataSubPage === 'entities' ? 'active' : ''}" onclick="setDataSubPage('entities')">Entities</div>
            </div>
          </div>
          <div class="flex gap-2 items-center">
            <input type="text" class="form-input search-input" placeholder="搜索...">
            <button class="btn btn-ghost btn-icon" onclick="refreshData()">🔄</button>
          </div>
        </div>
        
        <div class="card-body" style="padding: 0;">
          ${renderDataTable(dataSubPage, current.data)}
        </div>
        
        <div class="pagination">
          <div class="pagination-info">显示 ${current.data.length} 条记录</div>
          <div class="pagination-controls">
            <button class="page-btn" disabled>←</button>
            <button class="page-btn active">1</button>
            <button class="page-btn" disabled>→</button>
          </div>
        </div>
      </div>
    `;
  },
  
  // System Page
  system() {
    const { config, health } = store.state;
    
    return `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📁</div>
          <div class="stat-content">
            <div class="stat-value" style="font-size: var(--text-lg);">${config ? config.root_path : '-'}</div>
            <div class="stat-label">存储路径</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⚡</div>
          <div class="stat-content">
            <div class="stat-value">${config ? config.max_download_routine : '-'}</div>
            <div class="stat-label">最大并发下载</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📝</div>
          <div class="stat-content">
            <div class="stat-value">${config ? config.max_file_name_len : '-'}</div>
            <div class="stat-label">最大文件名长度</div>
          </div>
        </div>
      </div>
      
      <div class="card" style="margin-top: var(--space-6);">
        <div class="card-header">
          <div class="card-title">系统日志</div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="refreshLogs()">🔄 刷新</button>
            <button class="btn btn-ghost btn-sm" onclick="clearLogs()">🗑️ 清空</button>
          </div>
        </div>
        <div class="card-body">
          <div class="font-mono text-sm" style="background: var(--bg-primary); padding: var(--space-4); border-radius: var(--radius-md); max-height: 400px; overflow-y: auto;">
            <div style="color: var(--text-tertiary);">[2024-01-15 14:35:22] [INFO] Server started successfully</div>
            <div style="color: var(--text-tertiary);">[2024-01-15 14:35:20] [INFO] Database connected</div>

          </div>
        </div>

function renderTaskItem(task, showCheckbox = false) {
  const statusMap = {
    queued: { tag: 'tag-queued', text: '排队' },
    running: { tag: 'tag-running', text: '运行' },
    completed: { tag: 'tag-completed', text: '完成' },
    failed: { tag: 'tag-failed', text: '失败' },
    cancelled: { tag: 'tag-cancelled', text: '取消' }
  };
  
  const status = statusMap[task.status] || statusMap.queued;
  const pct = task.progress && task.progress.total ? 
    Math.round((task.progress.completed || 0) / task.progress.total * 100) : 0;
  
  const target = task.data?.screen_name || task.data?.list_id || 'Unknown';
  
  return `
    <div class="task-item" onclick="showTaskDetail('${task.task_id}')">
      ${showCheckbox ? `<div class="task-checkbox"><input type="checkbox" class="form-checkbox" data-task-id="${task.task_id}"></div>` : ''}
      <div class="task-info">
        <div class="task-title">${task.type} - ${target}</div>
        <div class="task-meta">
          <span class="tag ${status.tag}">${status.text}</span>
          <span>ID: ${task.task_id}</span>
          <span>${new Date(task.created_at).toLocaleString()}</span>
        </div>
      </div>
      <div class="task-progress">
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${pct}%"></div>
        </div>
        <div class="task-progress-text">${pct}%</div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        ${task.status === 'running' || task.status === 'queued' ? 
          `<button class="btn btn-danger btn-sm" onclick="cancelTask('${task.task_id}')">取消</button>` : 
          `<button class="btn btn-ghost btn-sm" onclick="showTaskDetail('${task.task_id}')">详情</button>`
        }
      </div>
    </div>
  `;
}

    lists: ['ID', 'Name', 'Owner ID'],
    entities: ['ID', 'User ID', 'Name', 'Latest Release', 'Media Count']
  };
  
  // Desktop table rows
  const rows = data.map(item => {
    if (type === 'users') {

        <td>${item.id}</td>

    } else {
      return `<tr>

        <td>${item.user_id}</td>
        <td>${item.name}</td>
        <td>${item.latest_release_time || '-'}</td>

  }).join('');
  
  // Mobile card items
  const mobileCards = data.map(item => {
    if (type === 'users') {
      return `
        <div class="mobile-card">
          <div style="font-weight: var(--font-semibold); margin-bottom: var(--space-2);">@${item.screen_name}</div>
          <div style="color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-2);">${item.name}</div>
          <div style="display: flex; gap: var(--space-4); font-size: var(--text-sm);">
            <span>ID: ${item.id}</span>
            <span>${item.protected ? '🔒 Protected' : '🔓 Public'}</span>
          </div>
        </div>
      `;
    } else if (type === 'lists') {
      return `
        <div class="mobile-card">
          <div style="font-weight: var(--font-semibold); margin-bottom: var(--space-2);">${item.name}</div>
          <div style="color: var(--text-secondary); font-size: var(--text-sm);">

          </div>

    } else {

          <div style="font-weight: var(--font-semibold); margin-bottom: var(--space-2);">${item.name}</div>

async function handleQuickDownload() {
  const input = document.getElementById('quickDownloadInput');
  const value = input.value.trim();
  if (!value) return;
  
  // Extract username from various formats
  let username = value;
  const match = value.match(/(?:twitter\.com|x\.com)\/([^/\s?]+)/);
  if (match) username = match[1];
  if (username.startsWith('@')) username = username.slice(1);
  
  try {
    await api.createUserDownload(username, { auto_follow: true });
    toast.show(`已创建用户下载任务: @${username}`);
    input.value = '';
    refreshTasks();
  } catch (err) {
    toast.show(err.message, 'error');
  }
}

async function createBatchTask() {

  try {
    await api.createBatchDownload({
      users,
      lists,
      auto_follow: document.getElementById('batchAutoFollow').checked,

      no_retry: document.getElementById('batchNoRetry').checked

function showTaskDetail(id) {
  const task = store.state.tasks.find(t => t.task_id === id);
  if (!task) return;
  
  const statusMap = {
    queued: '排队中',
    running: '运行中',
    completed: '已完成',
    failed: '失败',
    cancelled: '已取消'
  };
  
  const pct = task.progress && task.progress.total ? 
    Math.round((task.progress.completed || 0) / task.progress.total * 100) : 0;
  
  const content = `
    <div class="form-group">
      <label class="form-label">任务 ID</label>
      <div class="font-mono text-sm" style="background: var(--bg-primary); padding: var(--space-3); border-radius: var(--radius-md);">${task.task_id}</div>
    </div>
    <div class="form-group">
      <label class="form-label">类型</label>
      <div>${task.type}</div>
    </div>
    <div class="form-group">
      <label class="form-label">状态</label>
      <div class="tag tag-${task.status}">${statusMap[task.status] || task.status}</div>
    </div>
    <div class="form-group">
      <label class="form-label">进度</label>
      <div class="progress-bar" style="margin-bottom: var(--space-2);">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>
      <div class="text-sm text-secondary">${task.progress?.completed || 0} / ${task.progress?.total || 0} (${pct}%)</div>
    </div>
    <div class="form-group">
      <label class="form-label">创建时间</label>
      <div>${new Date(task.created_at).toLocaleString()}</div>
    </div>
    ${task.error ? `
      <div class="form-group">
        <label class="form-label" style="color: var(--danger);">错误信息</label>
        <div style="color: var(--danger); background: var(--danger-bg); padding: var(--space-3); border-radius: var(--radius-md);">${task.error}</div>
      </div>
    ` : ''}
  `;
  
  const footer = task.status === 'running' || task.status === 'queued' ? 
    `<button class="btn btn-danger" onclick="cancelTask('${task.task_id}'); drawer.close();">取消任务</button>` : 
    '<button class="btn btn-secondary" onclick="drawer.close()">关闭</button>';
  
  drawer.open('任务详情', content, footer);
}

// ============================================
// Navigation
// ============================================
function navigateTo(page) {
  store.setState({ currentPage: page });
  
  // Update sidebar
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  
  // Update mobile nav
  document.querySelectorAll('.mobile-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  
  // Update title
  const titles = { overview: '概览', tasks: '任务中心', data: '数据管理', system: '系统' };
  document.getElementById('pageTitle').textContent = titles[page];
  
  // Close sidebar on mobile
  if (store.state.isMobile) {
    document.getElementById('sidebar').classList.remove('open');
  }
  
  render();
}

function setDataSubPage(subPage) {
  store.setState({ dataSubPage: subPage });
  render();
}

function render() {
  const container = document.getElementById('contentContainer');
  const page = store.state.currentPage;
  
  if (pages[page]) {
    container.innerHTML = pages[page]();
    
    // Re-attach tab listeners for tasks page
    if (page === 'tasks') {
      document.querySelectorAll('[data-task-tab]').forEach(tab => {
        tab.onclick = () => {
          document.querySelectorAll('[data-task-tab]').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('taskFormContainer').innerHTML = renderTaskForm(tab.dataset.taskTab);
        };
      });
      
      // Attach filter and search listeners
      const filterSelect = document.getElementById('taskFilter');
      const searchInput = document.getElementById('taskSearch');
      if (filterSelect) {
        filterSelect.onchange = () => filterTasks();
      }
      if (searchInput) {
        searchInput.oninput = () => filterTasks();
      }
    }
    
    // Attach quick download enter key listener
    if (page === 'overview') {
      const input = document.getElementById('quickDownloadInput');
      if (input) {
        input.onkeypress = (e) => { 
          if (e.key === 'Enter') handleQuickDownload(); 
        };
      }
    }
  }
}

// Filter tasks based on status and search
function filterTasks() {
  const filter = document.getElementById('taskFilter')?.value || 'all';
  const search = document.getElementById('taskSearch')?.value?.toLowerCase() || '';
  
  let filtered = store.state.tasks;
  
  if (filter !== 'all') {
    filtered = filtered.filter(t => t.status === filter);
  }
  
  if (search) {
    filtered = filtered.filter(t => {
      const target = (t.data?.screen_name || t.data?.list_id || '').toString().toLowerCase();
      return target.includes(search) || t.task_id.toLowerCase().includes(search);
    });
  }
  
  const taskList = document.getElementById('taskList');
  if (taskList) {
    if (filtered.length === 0) {
      taskList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">没有找到匹配的任务</div>
          <div class="empty-desc">尝试调整筛选条件或搜索关键词</div>
        </div>
      `;
    } else {
      taskList.innerHTML = filtered.map(t => renderTaskItem(t, true)).join('');
    }
  }
}

// Initialization
// ============================================
// Utility: Format date
function formatDate(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr);
  return date.toLocaleString('zh-CN', { 
    year: 'numeric', 
    month: '2-digit', 
    day: '2-digit', 
    hour: '2-digit', 
    minute: '2-digit' 
  });
}

// Utility: Show loading state on button
function setButtonLoading(btn, loading) {
  if (loading) {
    btn.dataset.originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loading-spinner"></span> 处理中...';
    btn.disabled = true;
  } else {
    btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
    btn.disabled = false;
  }
}

async function init() {
  // Show loading state
  document.getElementById('contentContainer').innerHTML = `
    <div class="empty-state">
      <div class="skeleton" style="width: 64px; height: 64px; border-radius: var(--radius-xl); margin-bottom: var(--space-4);"></div>
      <div class="empty-title">加载中...</div>
      <div class="empty-desc">正在初始化应用数据</div>
    </div>
  `;
  
  // Load initial data
  try {
    const [health, tasks, users, lists, entities, config] = await Promise.all([
      api.getHealth(),
      api.getTasks(),
      api.getUsers(),
      api.getLists(),
      api.getEntities(),
      api.getConfig()
    ]);
    
    store.setState({
      health,
      tasks: tasks.tasks || [],
      users: users.users || [],
      lists: lists.lists || [],
      entities: entities.entities || [],
      config
    });
  } catch (err) {
    toast.show('加载数据失败: ' + err.message, 'error');
  }
  
  // Connect SSE
  sseManager.connect();
  
  // Initial render
  render();
}

// Event Listeners
document.getElementById('menuToggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};

document.querySelectorAll('.nav-item').forEach(el => {
  el.onclick = () => navigateTo(el.dataset.page);
});

document.querySelectorAll('.mobile-nav-item').forEach(el => {
  el.onclick = () => navigateTo(el.dataset.page);
});

document.getElementById('refreshBtn').onclick = () => {
  const page = store.state.currentPage;
  if (page === 'tasks') refreshTasks();
  else if (page === 'data') refreshData();
  else init();
};

// Handle window resize
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth < 768;
  if (isMobile !== store.state.isMobile) {
    store.setState({ isMobile });
  }
});

// Subscribe to state changes
store.subscribe(() => {
  render();
});

// Start
init();
</script>
