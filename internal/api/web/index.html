<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TMD Pro - Twitter Media Downloader</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232f81f7'/%3E%3Cstop offset='100%25' stop-color='%231f6feb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='8' y='8' width='84' height='84' rx='20' ry='20' fill='url(%23g)'/%3E%3Cpath d='M32 35 L68 35 L68 42 L52 42 L52 70 L45 70 L45 42 L32 42 Z' fill='white'/%3E%3Cpath d='M38 50 L62 50' stroke='white' stroke-width='4' stroke-linecap='round' opacity='0.6'/%3E%3Ccircle cx='72' cy='28' r='8' fill='%233fb950'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg viewBox="0 0 100 100"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2f81f7"/><stop offset="100%" stop-color="#1f6feb"/></linearGradient></defs><rect x="8" y="8" width="84" height="84" rx="20" ry="20" fill="url(#logoGrad)"/><path d="M32 35 L68 35 L68 42 L52 42 L52 70 L45 70 L45 42 L32 42 Z" fill="white"/><path d="M38 50 L62 50" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/><circle cx="72" cy="28" r="8" fill="#3fb950"/></svg>
      </div>
      <span class="logo-text">TMD Pro</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="overview">
        <span class="icon">📊</span>
        <span>概览</span>
      </div>
      <div class="nav-item" data-page="tasks">
        <span class="icon">🚀</span>
        <span>任务中心</span>
      </div>
      <div class="nav-item" data-page="data">
        <span class="icon">📁</span>
        <span>数据管理</span>
      </div>
      <div class="nav-item" data-page="system">
        <span class="icon">⚙️</span>
        <span>系统</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      TMD Pro v2.0.0
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-toggle btn-icon" id="menuToggle">☰</button>
        <h1 class="page-title" id="pageTitle">概览</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-icon" id="refreshBtn" title="刷新">🔄</button>
      </div>
    </header>

    <!-- Content Container -->
    <div class="content-container" id="contentContainer">
      <!-- Dynamic content will be rendered here -->
    </div>
  </main>

  <!-- Mobile Navigation -->
  <nav class="mobile-nav">
    <div class="mobile-nav-items">
      <div class="mobile-nav-item active" data-page="overview">
        <span class="icon">📊</span>
        <span>概览</span>
      </div>
      <div class="mobile-nav-item" data-page="tasks">
        <span class="icon">🚀</span>
        <span>任务</span>
      </div>
      <div class="mobile-nav-item" data-page="data">
        <span class="icon">📁</span>
        <span>数据</span>
      </div>
      <div class="mobile-nav-item" data-page="system">
        <span class="icon">⚙️</span>
        <span>系统</span>
      </div>
    </div>
  </nav>

  <!-- Drawer Overlay -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- Drawer -->
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <h3 class="drawer-title" id="drawerTitle">任务详情</h3>
      <button class="btn btn-ghost btn-icon" id="drawerClose">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <!-- Drawer content -->
    </div>
    <div class="drawer-footer" id="drawerFooter">
      <!-- Drawer actions -->
    </div>
  </aside>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
