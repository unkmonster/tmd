name: Go CI/CD

on:
  push:
    branches: ["master"]
    tags:
      - "v*"
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  ci:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build for Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -o bin/tmd-${{ runner.os }}-amd64.exe -v -ldflags "-w -s" .

      - name: Build for Unix
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          GOARCH=amd64 CGO_ENABLED=0 go build -o bin/tmd-${{ runner.os }}-amd64 -v -ldflags "-w -s" .

      - name: Test with CGO disabled on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "0"
          go test ./...

      - name: Test with CGO disabled on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          CGO_ENABLED=0 go test ./...

      - name: Race and coverage
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: go test -race -covermode atomic -coverprofile=covprofile ./...

      - name: Install goveralls
        if: ${{ matrix.os == 'ubuntu-latest' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        shell: bash
        run: go install github.com/mattn/goveralls@latest

      - name: Upload coverage
        if: ${{ matrix.os == 'ubuntu-latest' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        env:
          COVERALLS_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        shell: bash
        run: |
          if [ -n "$COVERALLS_TOKEN" ]; then
            goveralls -coverprofile=covprofile -service=github
          else
            echo "COVERALLS_REPO_TOKEN is not set, skipping coverage upload"
          fi

  release-build:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build for Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -o bin/tmd-${{ runner.os }}-amd64.exe -v -ldflags "-w -s" .

      - name: Build for Unix
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          GOARCH=amd64 CGO_ENABLED=0 go build -o bin/tmd-${{ runner.os }}-amd64 -v -ldflags "-w -s" .

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ runner.os }}
          path: bin/*
          if-no-files-found: error

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
