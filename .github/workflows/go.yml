name: Go Release

on:
  push:
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "doc/**"

permissions:
  contents: read

jobs:
  release-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [amd64, arm64]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        shell: bash
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          suffix=""
          [ "${{ runner.os }}" = "Windows" ] && suffix=".exe"
          go build -o "bin/tmd-${{ runner.os }}-${{ matrix.arch }}${suffix}" \
            -v -ldflags "-w -s -X github.com/unkmonster/tmd/internal/api.Version=${{ github.ref_name }}" .

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ runner.os }}-${{ matrix.arch }}
          path: bin/*
          if-no-files-found: error

  release:
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        working-directory: release-artifacts
        run: sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
